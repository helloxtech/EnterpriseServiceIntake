<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Routing Matrix</title>
  <style>
    :root {
      color-scheme: light;
      --esi-blue: #0067b1;
      --esi-blue-dark: #004f8a;
      --esi-border: #d7e2ee;
      --esi-muted: #5f6b7a;
      --esi-text: #17212f;
      --esi-surface: #ffffff;
      --esi-soft: #f4f8fc;
      --esi-success: #107c41;
      --esi-warning: #986f0b;
      --esi-danger: #a4262c;
      --esi-shadow: 0 12px 30px rgba(31, 45, 61, 0.08);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7fafd;
      color: var(--esi-text);
      font-size: 14px;
    }

    button,
    select {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--esi-muted);
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status {
      min-width: 170px;
      color: var(--esi-muted);
      text-align: right;
      font-size: 13px;
    }

    .button {
      border: 1px solid var(--esi-border);
      background: var(--esi-surface);
      color: var(--esi-text);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      min-height: 36px;
    }

    .button.primary {
      background: var(--esi-blue);
      border-color: var(--esi-blue);
      color: #fff;
      font-weight: 600;
    }

    .button:hover {
      border-color: var(--esi-blue);
    }

    .button.primary:hover {
      background: var(--esi-blue-dark);
    }

    .category-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 16px;
    }

    .category-tab {
      border: 1px solid var(--esi-border);
      background: var(--esi-surface);
      color: var(--esi-text);
      border-radius: 6px;
      padding: 10px 14px;
      white-space: nowrap;
      cursor: pointer;
    }

    .category-tab.active {
      background: #e8f3ff;
      border-color: var(--esi-blue);
      color: var(--esi-blue-dark);
      font-weight: 600;
    }

    .matrix-shell {
      background: var(--esi-surface);
      border: 1px solid var(--esi-border);
      border-radius: 8px;
      box-shadow: var(--esi-shadow);
      overflow: hidden;
    }

    .matrix-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--esi-border);
      background: var(--esi-soft);
    }

    .matrix-title {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--esi-muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef3f8;
      color: #334155;
      font-weight: 600;
    }

    .pill.review {
      background: #fff4ce;
      color: var(--esi-warning);
    }

    .pill.docs {
      background: #fde7e9;
      color: var(--esi-danger);
    }

    .matrix-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 1050px;
    }

    th,
    td {
      border-right: 1px solid var(--esi-border);
      border-bottom: 1px solid var(--esi-border);
      vertical-align: top;
    }

    th {
      background: #f8fbfe;
      padding: 12px;
      text-align: left;
      font-size: 13px;
      color: #475569;
      font-weight: 650;
    }

    th:first-child {
      width: 120px;
      color: var(--esi-text);
    }

    td {
      width: 23%;
      min-height: 160px;
      padding: 12px;
      background: #fff;
    }

    tr:last-child td,
    tr:last-child th {
      border-bottom: 0;
    }

    td:last-child,
    th:last-child {
      border-right: 0;
    }

    .severity {
      font-size: 15px;
      color: var(--esi-text);
      background: #fbfdff;
    }

    .cell {
      display: grid;
      gap: 10px;
    }

    .rule-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      padding: 0;
      color: var(--esi-blue);
      background: transparent;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }

    .rule-link:hover {
      color: var(--esi-blue-dark);
      text-decoration: underline;
    }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      color: var(--esi-muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-height: 34px;
      border: 1px solid #c8d5e3;
      border-radius: 5px;
      background: #fff;
      color: var(--esi-text);
      padding: 5px 8px;
    }

    select:focus,
    .button:focus,
    .category-tab:focus,
    .rule-link:focus,
    .toggle input:focus + span {
      outline: 2px solid #8cc8ff;
      outline-offset: 2px;
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #334155;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 22px;
      border: 1px solid #c8d5e3;
      border-radius: 999px;
      background: #fff;
      color: var(--esi-muted);
      font-size: 11px;
    }

    .toggle input:checked + span {
      border-color: var(--esi-blue);
      background: #e8f3ff;
      color: var(--esi-blue-dark);
    }

    .empty,
    .error {
      padding: 28px;
      background: var(--esi-surface);
      border: 1px solid var(--esi-border);
      border-radius: 8px;
      box-shadow: var(--esi-shadow);
    }

    .error {
      color: var(--esi-danger);
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #c8d5e3;
      border-top-color: var(--esi-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -3px;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 900px) {
      .page {
        padding: 16px;
      }

      .header,
      .matrix-head {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div>
        <h1>Routing Matrix</h1>
        <p class="subtitle">Exact-match rules by service category, impact level, and urgency.</p>
      </div>
      <div class="toolbar">
        <span class="status" data-status><span class="spinner"></span>Loading matrix</span>
        <button type="button" class="button" data-refresh>Refresh</button>
      </div>
    </header>

    <nav class="category-bar" data-categories aria-label="Service categories"></nav>
    <section data-content>
      <div class="empty"><span class="spinner"></span>Loading routing rules</div>
    </section>
  </main>

  <script>
    (function () {
      const severityOptions = [
        { label: "Low", value: 752630000 },
        { label: "Medium", value: 752630001 },
        { label: "High", value: 752630002 },
        { label: "Critical", value: 752630003 }
      ];
      const priorityOptions = [
        { label: "Low", value: 752630000 },
        { label: "Normal", value: 752630001 },
        { label: "High", value: 752630002 },
        { label: "Urgent", value: 752630003 }
      ];

      const state = {
        categories: [],
        departments: [],
        slaPolicies: [],
        rules: [],
        activeCategoryId: "",
        saving: new Set()
      };

      const content = document.querySelector("[data-content]");
      const categoryBar = document.querySelector("[data-categories]");
      const status = document.querySelector("[data-status]");
      const refreshButton = document.querySelector("[data-refresh]");

      function xrm() {
        return window.parent?.Xrm || window.top?.Xrm || window.Xrm;
      }

      function requireXrm() {
        const api = xrm();
        if (!api?.WebApi) {
          throw new Error("This page must be opened inside the model-driven app.");
        }
        return api;
      }

      function html(value) {
        const element = document.createElement("span");
        element.textContent = value == null ? "" : String(value);
        return element.innerHTML;
      }

      function setStatus(message, tone) {
        status.textContent = message;
        status.style.color = tone === "success"
          ? "var(--esi-success)"
          : tone === "error"
            ? "var(--esi-danger)"
            : "var(--esi-muted)";
      }

      function optionHtml(items, selectedId) {
        return items.map((item) => {
          const selected = item.id === selectedId ? " selected" : "";
          return `<option value="${html(item.id)}"${selected}>${html(item.name)}</option>`;
        }).join("");
      }

      function normalizeId(value) {
        return value ? String(value).replace(/[{}]/g, "").toLowerCase() : "";
      }

      function byName(a, b) {
        return a.name.localeCompare(b.name);
      }

      function ruleKey(categoryId, severity, priority) {
        return [normalizeId(categoryId), severity, priority].join("|");
      }

      function ruleMap() {
        const map = new Map();
        state.rules.forEach((rule) => {
          map.set(ruleKey(rule.categoryId, rule.severity, rule.priority), rule);
        });
        return map;
      }

      function activeCategory() {
        return state.categories.find((item) => item.id === state.activeCategoryId) || state.categories[0];
      }

      function renderCategories() {
        categoryBar.innerHTML = state.categories.map((category) => `
          <button type="button" class="category-tab${category.id === state.activeCategoryId ? " active" : ""}"
            data-category-id="${html(category.id)}">
            ${html(category.name)}
          </button>
        `).join("");
      }

      function render() {
        const category = activeCategory();
        if (!category) {
          content.innerHTML = '<div class="empty">No active service categories found.</div>';
          categoryBar.innerHTML = "";
          return;
        }

        state.activeCategoryId = category.id;
        renderCategories();

        const rules = ruleMap();
        const rows = severityOptions.map((severity) => {
          const cells = priorityOptions.map((priority) => {
            const rule = rules.get(ruleKey(category.id, severity.value, priority.value));
            return `<td>${rule ? renderCell(rule) : renderMissingCell(category, severity, priority)}</td>`;
          }).join("");

          return `
            <tr>
              <th scope="row" class="severity">${html(severity.label)}</th>
              ${cells}
            </tr>`;
        }).join("");

        content.innerHTML = `
          <section class="matrix-shell">
            <div class="matrix-head">
              <h2 class="matrix-title">${html(category.name)}</h2>
              <div class="legend">
                <span class="pill review">Review</span>
                <span class="pill docs">Docs</span>
                <span>Changes save immediately.</span>
              </div>
            </div>
            <div class="matrix-scroll">
              <table aria-label="${html(category.name)} routing matrix">
                <thead>
                  <tr>
                    <th>Impact</th>
                    ${priorityOptions.map((priority) => `<th scope="col">${html(priority.label)} urgency</th>`).join("")}
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </section>`;
      }

      function renderCell(rule) {
        const saving = state.saving.has(rule.id);
        return `
          <div class="cell" data-rule-id="${html(rule.id)}">
            <button type="button" class="rule-link" data-open-rule="${html(rule.id)}">${html(rule.name)}</button>
            <div class="field">
              <label for="dept-${html(rule.id)}">Department</label>
              <select id="dept-${html(rule.id)}" data-field="departmentId" ${saving ? "disabled" : ""}>
                ${optionHtml(state.departments, rule.departmentId)}
              </select>
            </div>
            <div class="field">
              <label for="sla-${html(rule.id)}">SLA Policy</label>
              <select id="sla-${html(rule.id)}" data-field="slaPolicyId" ${saving ? "disabled" : ""}>
                ${optionHtml(state.slaPolicies, rule.slaPolicyId)}
              </select>
            </div>
            <div class="toggles">
              <label class="toggle">
                <input type="checkbox" data-field="requiresApproval" ${rule.requiresApproval ? "checked" : ""} ${saving ? "disabled" : ""}>
                <span>${rule.requiresApproval ? "Yes" : "No"}</span>
                Review
              </label>
              <label class="toggle">
                <input type="checkbox" data-field="requiresDocumentation" ${rule.requiresDocumentation ? "checked" : ""} ${saving ? "disabled" : ""}>
                <span>${rule.requiresDocumentation ? "Yes" : "No"}</span>
                Docs
              </label>
            </div>
          </div>`;
      }

      function renderMissingCell(category, severity, priority) {
        return `
          <div class="cell">
            <strong>Missing rule</strong>
            <span>${html(category.name)} / ${html(severity.label)} / ${html(priority.label)}</span>
          </div>`;
      }

      async function loadData() {
        const api = requireXrm();
        setStatus("Loading matrix");

        const [categories, departments, slaPolicies, rules] = await Promise.all([
          api.WebApi.retrieveMultipleRecords("hx_servicecategory", "?$select=hx_servicecategoryid,hx_name,hx_code&$filter=hx_active eq true&$orderby=hx_name asc"),
          api.WebApi.retrieveMultipleRecords("hx_department", "?$select=hx_departmentid,hx_name&$filter=hx_active eq true&$orderby=hx_name asc"),
          api.WebApi.retrieveMultipleRecords("hx_slapolicy", "?$select=hx_slapolicyid,hx_name,hx_responsehours&$filter=hx_active eq true&$orderby=hx_responsehours asc"),
          api.WebApi.retrieveMultipleRecords("hx_routingrule", "?$select=hx_routingruleid,hx_name,hx_matchseverity,hx_matchpriority,hx_requiresapproval,hx_resolutiondocumentationrequired,hx_sortorder,_hx_servicecategory_value,_hx_department_value,_hx_slapolicy_value&$expand=hx_Servicecategory($select=hx_name),hx_Department($select=hx_name),hx_Slapolicy($select=hx_name,hx_responsehours)&$filter=hx_active eq true&$orderby=hx_sortorder asc")
        ]);

        state.categories = categories.entities.map((item) => ({
          id: normalizeId(item.hx_servicecategoryid),
          name: item.hx_name || item.hx_code || "Unnamed category"
        })).sort(byName);

        state.departments = departments.entities.map((item) => ({
          id: normalizeId(item.hx_departmentid),
          name: item.hx_name || "Unnamed department"
        })).sort(byName);

        state.slaPolicies = slaPolicies.entities.map((item) => ({
          id: normalizeId(item.hx_slapolicyid),
          name: item.hx_responsehours ? `${item.hx_name} (${item.hx_responsehours}h)` : item.hx_name
        })).sort(byName);

        state.rules = rules.entities.map((item) => ({
          id: normalizeId(item.hx_routingruleid),
          name: item.hx_name || "Routing rule",
          categoryId: normalizeId(item._hx_servicecategory_value),
          departmentId: normalizeId(item._hx_department_value),
          slaPolicyId: normalizeId(item._hx_slapolicy_value),
          severity: Number(item.hx_matchseverity),
          priority: Number(item.hx_matchpriority),
          requiresApproval: Boolean(item.hx_requiresapproval),
          requiresDocumentation: Boolean(item.hx_resolutiondocumentationrequired)
        }));

        if (!state.activeCategoryId && state.categories.length) {
          state.activeCategoryId = state.categories[0].id;
        }

        render();
        setStatus(`${state.rules.length} rules loaded`, "success");
      }

      async function updateRule(ruleId, field, value) {
        const api = requireXrm();
        const rule = state.rules.find((item) => item.id === ruleId);
        if (!rule) return;

        const payload = {};
        if (field === "departmentId") {
          payload["hx_Department@odata.bind"] = `/hx_departments(${value})`;
        } else if (field === "slaPolicyId") {
          payload["hx_Slapolicy@odata.bind"] = `/hx_slapolicies(${value})`;
        } else if (field === "requiresApproval") {
          payload.hx_requiresapproval = Boolean(value);
        } else if (field === "requiresDocumentation") {
          payload.hx_resolutiondocumentationrequired = Boolean(value);
        } else {
          return;
        }

        const previous = rule[field];
        rule[field] = value;
        state.saving.add(ruleId);
        render();
        setStatus("Saving change");

        try {
          await api.WebApi.updateRecord("hx_routingrule", ruleId, payload);
          setStatus("Change saved", "success");
        } catch (error) {
          rule[field] = previous;
          setStatus(error.message || "Could not save change", "error");
        } finally {
          state.saving.delete(ruleId);
          render();
        }
      }

      function openRule(ruleId) {
        const api = requireXrm();
        api.Navigation.openForm({
          entityName: "hx_routingrule",
          entityId: ruleId
        });
      }

      categoryBar.addEventListener("click", (event) => {
        const button = event.target.closest("[data-category-id]");
        if (!button) return;
        state.activeCategoryId = button.dataset.categoryId;
        render();
      });

      content.addEventListener("click", (event) => {
        const opener = event.target.closest("[data-open-rule]");
        if (opener) {
          openRule(opener.dataset.openRule);
        }
      });

      content.addEventListener("change", (event) => {
        const control = event.target;
        const cell = control.closest("[data-rule-id]");
        if (!cell || !control.dataset.field) return;

        const value = control.type === "checkbox" ? control.checked : normalizeId(control.value);
        updateRule(cell.dataset.ruleId, control.dataset.field, value);
      });

      refreshButton.addEventListener("click", () => {
        state.saving.clear();
        loadData().catch(showError);
      });

      function showError(error) {
        content.innerHTML = `<div class="error">${html(error.message || error)}</div>`;
        setStatus("Matrix unavailable", "error");
      }

      loadData().catch(showError);
    })();
  </script>
</body>
</html>
